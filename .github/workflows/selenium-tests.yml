name: Selenium Test Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  checkout:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Upload Source
        uses: actions/upload-artifact@v4
        with:
          name: source
          path: .

  build:
    runs-on: windows-latest
    needs: checkout
    steps:
      - name: Download Source
        uses: actions/download-artifact@v4
        with:
          name: source
          path: .

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

  test:
    runs-on: windows-latest
    needs: build
    steps:
      - name: Download Source
        uses: actions/download-artifact@v4
        with:
          name: source
          path: .

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore Cached Dependencies
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests
        run: python TestRunner.py

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: reports/allure-results

  report:
    runs-on: windows-latest
    needs: test
    if: always()
    steps:
      - name: Download Allure Results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: reports/allure-results

      - name: Install Allure CLI
        run: |
          $version = "2.38.0"
          $url = "https://github.com/allure-framework/allure2/releases/download/$version/allure-$version.zip"
          Invoke-WebRequest -Uri $url -OutFile "allure.zip"
          Expand-Archive -Path "allure.zip" -DestinationPath "C:\allure"
          echo "C:\allure\allure-$version\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: powershell

      - name: Generate Allure Report
        run: allure generate reports/allure-results --clean -o reports/allure-report
        shell: powershell

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report

  publish-report:
    runs-on: ubuntu-latest
    needs: report
    if: always()
    permissions:
      contents: write       # ← required to push to gh-pages branch
    steps:
      - name: Download Allure Report
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: reports/allure-report

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: reports/allure-report

  email:
    runs-on: windows-latest
    needs: [test, report, pages]
    if: always()
    steps:
      - name: Send Email on Success
        if: needs.test.result == 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "✅ PASSED - ${{ github.repository }} #${{ github.run_number }}"
          to: jajulaapparao@gmail.com
          from: ${{ secrets.EMAIL_USERNAME }}
          html_body: |
            <html>
            <body>
              <h2 style="color:green;">✅ All Tests Passed!</h2>
              <table border="1" cellpadding="6" cellspacing="0">
                <tr><td><b>Repository</b></td><td>${{ github.repository }}</td></tr>
                <tr><td><b>Branch</b></td><td>${{ github.ref_name }}</td></tr>
                <tr><td><b>Run #</b></td><td>${{ github.run_number }}</td></tr>
                <tr><td><b>Triggered by</b></td><td>${{ github.actor }}</td></tr>
                <tr><td><b>Commit</b></td><td>${{ github.event.head_commit.message }}</td></tr>
              </table>
              <br>
              <a href="https://venkata25jajula.github.io/python_selenium-framework/" style="
                background-color:#2196F3;color:white;padding:10px 20px;
                text-decoration:none;border-radius:4px;margin-right:10px;">
                📊 View Allure Report
              </a>
              <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" style="
                background-color:#4CAF50;color:white;padding:10px 20px;
                text-decoration:none;border-radius:4px;">
                ✅ View Test Run
              </a>
            </body>
            </html>

      - name: Send Email on Failure
        if: needs.test.result == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "❌ FAILED - ${{ github.repository }} #${{ github.run_number }}"
          to: jajulaapparao@gmail.com
          from: ${{ secrets.EMAIL_USERNAME }}
          html_body: |
            <html>
            <body>
              <h2 style="color:red;">❌ Build Failed!</h2>
              <table border="1" cellpadding="6" cellspacing="0">
                <tr><td><b>Repository</b></td><td>${{ github.repository }}</td></tr>
                <tr><td><b>Branch</b></td><td>${{ github.ref_name }}</td></tr>
                <tr><td><b>Run #</b></td><td>${{ github.run_number }}</td></tr>
                <tr><td><b>Triggered by</b></td><td>${{ github.actor }}</td></tr>
                <tr><td><b>Commit</b></td><td>${{ github.event.head_commit.message }}</td></tr>
              </table>
              <br>
              <a href="https://venkata25jajula.github.io/python_selenium-framework/" style="
                background-color:#2196F3;color:white;padding:10px 20px;
                text-decoration:none;border-radius:4px;margin-right:10px;">
                📊 View Allure Report
              </a>
              <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" style="
                background-color:#f44336;color:white;padding:10px 20px;
                text-decoration:none;border-radius:4px;">
                🖥️ View Failed Run
              </a>
            </body>
            </html>
