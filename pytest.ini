# pytest.ini
[pytest]
# Treat this directory as the root of the project
# Ensures imports from configs/ and tests/ work
pythonpath = .

# Look for tests in the tests/ folder
testpaths = tests

# Match test files and test functions
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Optional: verbose output
addopts = -v --tb=short
